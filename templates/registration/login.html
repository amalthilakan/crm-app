{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Login - CRM{% endblock %}

{% block content %}
<style>.asteriskField { display: none !important; }</style>
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4 mt-5">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow-sm" style="width: 56px; height: 56px; font-size: 1.4rem;">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <h3 class="fw-bold text-dark mb-1">Welcome Back</h3>
                    <p class="text-muted small mb-0">Sign in to your CRM account</p>
                </div>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">Sign In <i class="fa-solid fa-arrow-right ms-2"></i></button>
                    </div>
                </form>
                <hr class="my-4">
                <p class="text-center text-muted small mb-0">Don't have an account? <a href="{% url 'signup' %}" class="fw-bold text-primary text-decoration-none">Sign up</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
