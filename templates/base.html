<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate">
    <title>{% block title %}Django CRM{% endblock %}</title>
    
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      
      :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --secondary: #64748b;
        --dark: #0f172a;
        --text-muted: #64748b;
        --bg-color: #f8fafc;
        --card-bg: rgba(255, 255, 255, 0.85);
      }
      
      html, body {
        overflow-x: hidden;
      }
      
      body {
        background-color: var(--bg-color);
        font-family: "Inter", sans-serif;
        color: var(--dark);
        animation: pageFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      @keyframes pageFadeIn {
        from { opacity: 0; transform: translateY(10px); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
      }
      
      @keyframes rowFadeIn {
        from { opacity: 0; transform: translateY(15px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      .navbar {
        background: rgba(255, 255, 255, 0.75) !important;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255,255,255,0.4);
        box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03);
        padding: 1rem 0;
      }
      .navbar-brand {
        color: var(--dark) !important;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .nav-link {
        color: var(--text-muted) !important;
        font-weight: 500;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        padding: 0.5rem 1rem !important;
        border-radius: 8px;
        margin: 0 0.2rem;
      }
      .nav-link:hover, .nav-link.active {
        color: var(--primary) !important;
        background: rgba(79, 70, 229, 0.08);
        transform: translateY(-1px);
      }
      
      .card {
        border: 1px solid rgba(255,255,255,0.6);
        border-radius: 20px;
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 10px 40px -10px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.8);
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
      }
      .card:not(.no-hover):hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
      }
      
      .btn {
        border-radius: 10px;
        font-weight: 600;
        padding: 0.6rem 1.2rem;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        letter-spacing: 0.2px;
      }
      .btn:active {
        transform: scale(0.95) !important;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--primary-hover));
        border: none;
        box-shadow: 0 4px 15px rgba(79, 70, 229, 0.35);
      }
      .btn-primary:hover {
        background: linear-gradient(135deg, var(--primary-hover), #312e81);
        box-shadow: 0 8px 25px rgba(79, 70, 229, 0.45);
        transform: translateY(-2px);
      }
      .btn-outline-danger { border-color: #fecdd3; color: #e11d48; background: #fff1f2; }
      .btn-outline-danger:hover { background: #e11d48; color: white; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(225, 29, 72, 0.25); border-color: #e11d48; }
      
      .btn-outline-success { border-color: #bbf7d0; color: #16a34a; background: #f0fdf4; }
      .btn-outline-success:hover { background: #16a34a; color: white; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(22, 163, 74, 0.25); border-color: #16a34a; }
      
      .table {
        border-collapse: separate;
        border-spacing: 0 12px;
        background: transparent;
      }
      .table tbody tr {
        background-color: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        border-radius: 14px;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .table tbody tr:hover {
        transform: scale(1.01) translateY(-3px);
        box-shadow: 0 12px 24px rgba(0,0,0,0.06);
        z-index: 10;
        position: relative;
      }
      .table td, .table th {
        border: none;
        padding: 20px 24px;
        vertical-align: middle;
      }
      .table th {
        color: var(--text-muted);
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        padding-bottom: 4px;
      }
      .table td:first-child, .table th:first-child { border-top-left-radius: 14px; border-bottom-left-radius: 14px; }
      .table td:last-child, .table th:last-child { border-top-right-radius: 14px; border-bottom-right-radius: 14px; }
      
      .asteriskField {
        color: #dc3545 !important;
      }
      .asteriskField::before {
        content: " ";
      }
      .content-container {
        padding: 3rem 0;
        min-height: calc(100vh - 100px);
      }
      .hover-grow:hover { transform: scale(1.1); }
      
      .form-control, .form-select {
        border-radius: 10px;
        border: 1.5px solid #e2e8f0;
        padding: 0.6rem 0.9rem;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .form-control:focus, .form-select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
      }
      label.form-label { font-weight: 600; font-size: 0.875rem; color: #374151; }
      .badge-pill { border-radius: 999px; padding: 0.35em 0.75em; font-size: 0.78rem; font-weight: 600; }
      .empty-state { padding: 4rem 2rem; text-align: center; color: var(--text-muted); }
      .empty-state i { font-size: 3rem; opacity: 0.35; margin-bottom: 1rem; display: block; }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg sticky-top mb-4">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'customer_list' %}">
          <div class="bg-primary text-white rounded-3 d-flex align-items-center justify-content-center me-2 shadow-sm" style="width: 38px; height: 38px;">
            <i class="fa-solid fa-bolt fa-lg"></i>
          </div>
          CRM
        </a>
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <i class="fa-solid fa-bars text-dark fs-4"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          {% if user.is_authenticated %}
          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a class="nav-link {% if request.resolver_match.url_name == 'customer_list' %}active{% endif %}" href="{% url 'customer_list' %}"><i class="fa-solid fa-users me-1"></i> Customers</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if request.resolver_match.url_name == 'user_list' %}active{% endif %}" href="{% url 'user_list' %}"><i class="fa-solid fa-user-shield me-1"></i> Admins</a>
            </li>
          </ul>
          <div class="d-flex align-items-center mt-3 mt-lg-0 pb-3 pb-lg-0">
            <a href="{% url 'profile_update' %}" class="text-decoration-none me-3 d-flex align-items-center hover-grow" style="transition: all 0.2s;">
              <img src="https://ui-avatars.com/api/?name={{ user.get_full_name|default:user.username }}&background=e0e7ff&color=4f46e5&bold=true" class="rounded-circle shadow-sm me-2" style="width: 38px; height: 38px; object-fit: cover;" alt="Avatar">
              <span class="text-dark fw-bold" style="font-size: 0.95rem;">{{ user.get_full_name|default:user.username|title }}</span>
            </a>
            <form action="{% url 'logout' %}" method="post" class="m-0">
              {% csrf_token %}
              <button type="submit" class="btn btn-light border bg-white shadow-sm text-danger hover-grow" title="Logout" style="width: 40px; height: 40px; padding: 0; border-radius: 10px;">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
              </button>
            </form>
          </div>
          {% endif %}
        </div>
      </div>
    </nav>

    <div class="container content-container">


      <div class="row">
        <div class="col-12">{% block content %} {% endblock %}</div>
      </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    
    <div class="toast-container position-fixed top-0 end-0 p-4 pt-5 mt-4" style="z-index: 1055;">
      {% if messages %}
        {% for message in messages %}
        <div class="toast align-items-center text-white bg-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% else %}primary{% endif %} border-0 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
          <div class="d-flex">
            <div class="toast-body fs-6">
              <i class="fa-solid {% if message.tags == 'error' %}fa-circle-xmark{% elif message.tags == 'success' %}fa-circle-check{% else %}fa-circle-info{% endif %} me-2"></i>
              {{ message }}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
          </div>
        </div>
        {% endfor %}
      {% endif %}
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
          var toastElList = [].slice.call(document.querySelectorAll('.toast'))
          var toastList = toastElList.map(function (toastEl) {
              return new bootstrap.Toast(toastEl, { autohide: true })
          })
          toastList.forEach(toast => toast.show())

          document.querySelectorAll('input[type="password"]').forEach(function (input) {
              var wrapper = document.createElement('div');
              wrapper.className = 'input-group';
              input.parentNode.insertBefore(wrapper, input);
              wrapper.appendChild(input);

              var btn = document.createElement('button');
              btn.type = 'button';
              btn.className = 'btn btn-outline-secondary';
              btn.style.borderRadius = '0 10px 10px 0';
              btn.innerHTML = '<i class="fa-solid fa-eye"></i>';
              wrapper.appendChild(btn);

              btn.addEventListener('click', function () {
                  if (input.type === 'password') {
                      input.type = 'text';
                      btn.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
                  } else {
                      input.type = 'password';
                      btn.innerHTML = '<i class="fa-solid fa-eye"></i>';
                  }
              });
          });
      });
    </script>
  </body>
</html>
