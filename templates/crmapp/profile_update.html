{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Update Profile - CRM{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 mt-4">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
                <h3 class="text-center fw-bold mb-4 pb-3 border-bottom"><i class="fa-solid fa-user-gear text-primary me-2"></i>My Profile Settings</h3>
                
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    {{ profile_form|crispy }}
                    <div class="d-grid mt-4 pt-3 text-center">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm fw-bold"><i class="fa-solid fa-check me-2"></i>Update Profile</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
