{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}My Profile Settings - CRM{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 mt-4">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
                <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                    <h3 class="fw-bold mb-0"><i class="fa-solid fa-user-gear text-primary me-2"></i>My Profile Settings</h3>
                    <a href="{% url 'customer_list' %}" class="btn btn-outline-secondary btn-sm"><i class="fa-solid fa-arrow-left me-1"></i>Back</a>
                </div>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    {{ profile_form|crispy }}
                    <div class="d-grid mt-4 pt-3 border-top">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold"><i class="fa-solid fa-check me-2"></i>Update Profile</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
