{% extends "base.html" %}

{% block title %}Delete {{ user_obj.username }} - CRM{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 mt-5">
        <div class="card shadow border-danger border-2 rounded-4">
            <div class="card-body p-5 text-center">
                <i class="fa-solid fa-triangle-exclamation fa-4x text-danger mb-4"></i>
                <h3 class="fw-bold mb-3">Delete Admin User</h3>
                <p class="text-muted fs-5 mb-4">
                    Are you sure you want to delete the admin user <strong>"{{ user_obj.username }}"</strong>? <br>
                    <span class="text-danger">This action cannot be undone.</span>
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                        <a href="{% url 'user_list' %}" class="btn btn-light btn-lg border px-4">Cancel</a>
                        <button type="submit" class="btn btn-danger btn-lg px-4"><i class="fa-solid fa-trash me-2"></i>Yes, Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
